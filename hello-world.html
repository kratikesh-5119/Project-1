<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10162f" />
    <title>Hello, World!</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap");

      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #10162f;
        color: #f8f9ff;
        font-family: Outfit, system-ui, sans-serif;
      }
      .orb {
        position: fixed;
        width: 34rem;
        aspect-ratio: 1;
        border-radius: 50%;
        filter: blur(20px);
        opacity: .8;
        animation: drift 12s ease-in-out infinite alternate;
      }
      .orb.one { background: #6c63ff; top: -16rem; left: -10rem; }
      .orb.two { background: #ff5da2; right: -13rem; bottom: -17rem; animation-delay: -5s; }
      main {
        width: min(90%, 46rem);
        padding: clamp(2rem, 7vw, 5rem);
        position: relative;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, .2);
        border-radius: 28px;
        background: rgba(15, 21, 49, .56);
        box-shadow: 0 24px 80px rgba(0, 0, 0, .28);
        backdrop-filter: blur(18px);
        animation: arrive .8s cubic-bezier(.2,.8,.2,1) both;
      }
      .eyebrow {
        margin: 0 0 1.3rem;
        color: #aeb5ff;
        font: 500 .78rem/1 "DM Mono", monospace;
        letter-spacing: .16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: clamp(3.2rem, 10vw, 6.8rem);
        line-height: .93;
        letter-spacing: -.07em;
      }
      h1 span {
        display: block;
        background: linear-gradient(110deg, #fff 18%, #b7b6ff 47%, #ffb5d3 75%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p:not(.eyebrow) {
        max-width: 31rem;
        margin: 1.8rem auto 0;
        color: #d7daf4;
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.65;
      }
      .sparkle { color: #ffdf78; }
      @keyframes arrive { from { opacity: 0; transform: translateY(24px) scale(.97); } to { opacity: 1; transform: none; } }
      @keyframes drift { to { transform: translate(5rem, 3rem) scale(1.13); } }
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; } }
    </style>
  </head>
  <body>
    <div class="orb one"></div>
    <div class="orb two"></div>
    <main>
      <p class="eyebrow">A friendly little beginning</p>
      <h1>Hello,<span>World!</span></h1>
      <p>Something wonderful starts with a single line of code. <span class="sparkle">✦</span></p>
    </main>
  </body>
</html>
